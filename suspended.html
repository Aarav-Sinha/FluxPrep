<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxPrep | Access Revoked</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --error: #ef4444;
            --error-glow: rgba(239, 68, 68, 0.2);
            --bg: #020617;
            --card: #0f172a;
            --border: rgba(255, 255, 255, 0.08);
            --text-high: #ffffff;
            --text-mid: #94a3b8;
            --primary: #22d3ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-high);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: var(--error);
            filter: blur(150px);
            opacity: 0.15;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .suspend-card {
            width: 90%;
            max-width: 500px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 4rem 3rem;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--error);
            font-size: 2rem;
            box-shadow: 0 0 30px var(--error-glow);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        .ban-msg {
            color: var(--text-mid);
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .admin-meta {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: left;
        }

        .admin-meta label {
            display: block;
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .admin-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #25d366; /* WhatsApp Green */
            color: #000;
            text-decoration: none;
            padding: 1rem;
            border-radius: 14px;
            font-weight: 800;
            justify-content: center;
            transition: 0.3s;
        }

        .contact-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .code-id {
            margin-top: 2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-mid);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="suspend-card">
        <div class="icon-box">
            <i class="fa-solid fa-user-slash"></i>
        </div>

        <h1>Access Suspended</h1>
        
        <p class="ban-msg">
            Your FluxPrep account has been restricted due to a violation of our community guidelines or security protocols. 
            <strong>Access to all modules, vaults, and live ranking is currently frozen.</strong>
        </p>

        <div class="admin-meta">
            <label>Authority In Charge</label>
            <div class="admin-name">
                <i class="fa-solid fa-shield-halved" style="color:var(--primary)"></i>
                Aarav Sinha
            </div>

            <label>Appeal Procedures</label>
            <a href="https://wa.me/917718978934?text=Hello%20Aarav,%20My%20FluxPrep%20account%20has%20been%20suspended.%20I%20would%20like%20to%20appeal." class="contact-link">
                <i class="fa-brands fa-whatsapp"></i> Contact via WhatsApp
            </a>
        </div>

        <div class="code-id">
            STATUS_CODE: FP_BLOCK_AUTH_REVOKED
        </div>
    </div>

    <script>
        // Disable right-click and back button to make the ban feel "real"
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>
</html>
